services:
  - type: web
    name: sentientweb-app
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build:web
    preDeployCommand: npm run render:predeploy
    startCommand: npm run start:web
    healthCheckPath: /healthz
    maxShutdownDelaySeconds: 60
    domains:
      - app.sentientweb.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://app.sentientweb.com
      - key: MAGIC_LINK_BASE_URL
        value: https://app.sentientweb.com
      - key: FIRST_TENANT_BOOTSTRAP_SECRET
        sync: false
      - key: TRUST_PROXY_HEADERS
        value: "true"
      - key: START_WORKER
        value: "false"
      - key: DEFAULT_AI_PROVIDER
        value: openai
      - key: DEFAULT_AI_MODEL
        value: gpt-4o-mini
      - key: DATABASE_URL
        fromDatabase:
          name: sentientweb-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sentientweb-kv
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPERATOR_DEFAULT_EMAIL
        sync: false

  - type: worker
    name: sentientweb-worker
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build:worker
    startCommand: npm run start:worker
    maxShutdownDelaySeconds: 120
    envVars:
      - key: NODE_ENV
        value: production
      - key: START_WORKER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: sentientweb-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sentientweb-kv
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

  # Add a dedicated shopify.sentientweb.com web service in Phase 3.
  - type: keyvalue
    name: sentientweb-kv
    region: oregon
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: sentientweb-postgres
    databaseName: sentientweb
    user: sentientweb
    region: oregon
    plan: basic-1gb
    ipAllowList: []
    diskSizeGB: 10
    storageAutoscalingEnabled: true
